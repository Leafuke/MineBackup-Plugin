# ============================================================
# MineBackup Plugin Configuration
# Spigot/Paper 1.21
# ============================================================

general:
  debug: false

restore:
  require-confirm: true
  confirm-timeout-seconds: 60
  countdown-seconds: 10
  remote-restore-countdown: true
  remote-countdown-seconds: 10

restart:
  enabled: true

  # Available values:
  #   spigot  - use Spigot's restart flow and configured restart-script
  #   script  - only write the restart flag; external tooling must restart the server
  #   sidecar - launch MineBackup's built-in Java sidecar to relay events and run the restart script
  #   none    - shut down only
  method: sidecar

  # Script or command file used to start the server again.
  # In sidecar mode this script is launched by the sidecar process.
  script-path: "./start.bat"

  sidecar:
    start-timeout-seconds: 5
    relay-timeout-seconds: 20

logging:
  enabled: true
  max-size-mb: 10
  max-files: 5

auto-backup:
  config-id: ""
  world-index: -1
  interval-seconds: -1
