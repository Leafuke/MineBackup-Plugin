name: MineBackupPlugin
version: '${version}'
main: org.leafuke.mineBackupPlugin.MineBackupPlugin
api-version: '1.21'
description: MineBackup integration plugin for Spigot/Paper servers

commands:
  mb:
    description: Main MineBackup command
    usage: /mb <subcommand> [args...]
    permission: minebackup.command
  minebackup:
    description: Legacy command redirected to /mb
    usage: /minebackup
    permission: minebackup.command

permissions:
  minebackup.command:
    description: Allows use of MineBackup commands
    default: op
